<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="390" viewBox="0 0 1200 390" role="img" aria-labelledby="title desc">
  <title id="title">Jessica Karelle current direction</title>
  <desc id="desc">Three areas that define Jessica's current work: application engineering, product systems and interface quality.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0a1c31"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#75c3ff"/>
      <stop offset="100%" stop-color="#3679ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#000814" flood-opacity=".3"/>
    </filter>
  </defs>

  <rect width="1200" height="390" rx="28" fill="url(#bg)"/>
  <text x="54" y="70" fill="#f6f9ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800">CURRENT DIRECTION</text>
  <text x="54" y="106" fill="#8aa4be" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">The type of work I want my profile to communicate immediately.</text>

  <g filter="url(#shadow)">
    <rect x="54" y="145" width="338" height="188" rx="22" fill="#0d1b2d" stroke="#21415f"/>
    <rect x="431" y="145" width="338" height="188" rx="22" fill="#0d1b2d" stroke="#21415f"/>
    <rect x="808" y="145" width="338" height="188" rx="22" fill="#0d1b2d" stroke="#21415f"/>
  </g>

  <rect x="78" y="171" width="42" height="6" rx="3" fill="url(#accent)"/>
  <rect x="455" y="171" width="42" height="6" rx="3" fill="url(#accent)"/>
  <rect x="832" y="171" width="42" height="6" rx="3" fill="url(#accent)"/>

  <text x="78" y="218" fill="#f7fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="800">APPLICATION ENGINEERING</text>
  <text x="78" y="252" fill="#b5c7d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Reliable .NET and Blazor applications,</text>
  <text x="78" y="278" fill="#b5c7d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">clear architecture and maintainable code.</text>

  <text x="455" y="218" fill="#f7fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="800">PRODUCT SYSTEMS</text>
  <text x="455" y="252" fill="#b5c7d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">SaaS workflows, data-backed features</text>
  <text x="455" y="278" fill="#b5c7d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">and long-term product structure.</text>

  <text x="832" y="218" fill="#f7fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="23" font-weight="800">INTERFACE QUALITY</text>
  <text x="832" y="252" fill="#b5c7d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Responsive UI, accessibility, consistency</text>
  <text x="832" y="278" fill="#b5c7d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">and polished interaction details.</text>
</svg>
