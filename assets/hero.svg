<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Jessica Karelle — Software Developer</title>
  <desc id="desc">Custom profile banner presenting Jessica Karelle as a computer science student and software developer in Québec.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="55%" stop-color="#0b1d37"/>
      <stop offset="100%" stop-color="#113d74"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#6bb8ff"/>
      <stop offset="100%" stop-color="#2f75ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1">
      <stop offset="0%" stop-color="#0e2038" stop-opacity=".96"/>
      <stop offset="100%" stop-color="#102b4d" stop-opacity=".92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000814" flood-opacity=".35"/>
    </filter>
  </defs>

  <rect width="1200" height="420" rx="32" fill="url(#bg)"/>
  <g opacity=".14" stroke="#88c5ff">
    <path d="M760 34H1142M700 82H1142M820 130H1142M900 178H1142"/>
    <path d="M1020 0V210M1080 0V210M1140 0V210"/>
  </g>

  <rect x="56" y="52" width="8" height="114" rx="4" fill="url(#accent)"/>
  <text x="92" y="82" fill="#8cc8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" letter-spacing="3">
    JESSICA KARELLE / SOFTWARE DEVELOPMENT
  </text>

  <text x="92" y="145" fill="#f7fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="800">
    Building software
  </text>
  <text x="92" y="204" fill="#f7fbff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="54" font-weight="800">
    that feels intentional.
  </text>

  <text x="94" y="252" fill="#b7c9dc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21">
    Computer Science student in Québec focused on .NET, modern web products,
  </text>
  <text x="94" y="284" fill="#b7c9dc" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="21">
    maintainable architecture and refined user interfaces.
  </text>

  <g filter="url(#shadow)">
    <rect x="92" y="326" width="228" height="58" rx="16" fill="url(#card)" stroke="#24496f"/>
    <rect x="336" y="326" width="228" height="58" rx="16" fill="url(#card)" stroke="#24496f"/>
    <rect x="580" y="326" width="228" height="58" rx="16" fill="url(#card)" stroke="#24496f"/>
    <rect x="824" y="326" width="284" height="58" rx="16" fill="url(#card)" stroke="#24496f"/>
  </g>

  <circle cx="120" cy="355" r="8" fill="#67b7ff"/>
  <circle cx="364" cy="355" r="8" fill="#67b7ff"/>
  <circle cx="608" cy="355" r="8" fill="#67b7ff"/>
  <circle cx="852" cy="355" r="8" fill="#67b7ff"/>

  <text x="140" y="362" fill="#f3f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">C# / .NET / Blazor</text>
  <text x="384" y="362" fill="#f3f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">React / Next.js</text>
  <text x="628" y="362" fill="#f3f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">SQL / Supabase</text>
  <text x="872" y="362" fill="#f3f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700">Product systems / UI quality</text>
</svg>
