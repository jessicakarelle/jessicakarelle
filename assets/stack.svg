<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="610" viewBox="0 0 1200 610" role="img" aria-labelledby="title desc">
  <title id="title">Jessica Karelle engineering stack</title>
  <desc id="desc">A structured overview of Jessica's primary technologies, regular ecosystem and engineering tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#0c1a2c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#6bb8ff"/>
      <stop offset="100%" stop-color="#377dff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000814" flood-opacity=".28"/>
    </filter>
  </defs>

  <rect width="1200" height="610" rx="28" fill="url(#bg)"/>
  <text x="54" y="70" fill="#f6f9ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="30" font-weight="800">ENGINEERING STACK</text>
  <text x="54" y="106" fill="#8aa4be" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Structured by how I actually work — not by how many logos fit on one line.</text>
  <rect x="54" y="130" width="1092" height="2" fill="#20374f"/>

  <g filter="url(#shadow)">
    <rect x="54" y="166" width="1092" height="118" rx="22" fill="#0d1b2d" stroke="#21415f"/>
    <rect x="54" y="304" width="1092" height="118" rx="22" fill="#0d1b2d" stroke="#21415f"/>
    <rect x="54" y="442" width="1092" height="118" rx="22" fill="#0d1b2d" stroke="#21415f"/>
  </g>

  <rect x="54" y="166" width="9" height="118" rx="4" fill="url(#accent)"/>
  <rect x="54" y="304" width="9" height="118" rx="4" fill="#4f8fff"/>
  <rect x="54" y="442" width="9" height="118" rx="4" fill="#2e6ac6"/>

  <text x="88" y="207" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">PRIMARY</text>
  <text x="88" y="238" fill="#8da8c3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Core application development</text>
  <text x="330" y="222" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">C#</text>
  <text x="400" y="222" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">.NET</text>
  <text x="486" y="222" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">ASP.NET Core</text>
  <text x="640" y="222" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Blazor</text>
  <text x="746" y="222" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">SQL</text>
  <text x="820" y="222" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">React</text>
  <text x="914" y="222" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">JavaScript</text>
  <text x="1030" y="222" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">HTML / CSS</text>

  <text x="88" y="345" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">REGULARLY USED</text>
  <text x="88" y="376" fill="#8da8c3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Web products, data and interface systems</text>
  <text x="414" y="360" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">TypeScript</text>
  <text x="526" y="360" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Next.js</text>
  <text x="620" y="360" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Vite</text>
  <text x="684" y="360" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Tailwind</text>
  <text x="786" y="360" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Bootstrap</text>
  <text x="902" y="360" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">PostgreSQL</text>
  <text x="1032" y="360" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Supabase</text>
  <text x="414" y="390" fill="#b5c7d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">MudBlazor · Expo / React Native · Responsive UI · i18n</text>

  <text x="88" y="483" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="22" font-weight="800">QUALITY &amp; TOOLING</text>
  <text x="88" y="514" fill="#8da8c3" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15">Delivery, testing and maintainability</text>
  <text x="392" y="498" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Git / GitHub</text>
  <text x="520" y="498" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Playwright</text>
  <text x="646" y="498" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">PowerShell</text>
  <text x="780" y="498" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Visual Studio</text>
  <text x="922" y="498" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">VS Code</text>
  <text x="1024" y="498" fill="#f5f8ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="20" font-weight="700">Unity 2D</text>
  <text x="392" y="528" fill="#b5c7d8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Component architecture · QA workflows · documentation · accessibility</text>
